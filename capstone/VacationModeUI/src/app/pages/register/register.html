<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Join VacationMode today</p>

    <div *ngIf="errorMessage" class="alert alert-error">
      ⚠️ {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="alert alert-success">
      ✅ {{ successMessage }}
    </div>

    <form (ngSubmit)="register()">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" [(ngModel)]="user.fullName" name="fullName" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" [(ngModel)]="user.email" name="email" required />
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" placeholder="Enter your phone number" [(ngModel)]="user.phoneNumber" name="phoneNumber" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Create a password (min 6 characters)" [(ngModel)]="user.password" name="password" required minlength="6" />
      </div>

      <div class="form-group">
        <label>I want to</label>
        <select [(ngModel)]="user.role" name="role" required>
          <option value="Renter">Rent a Property (Renter)</option>
          <option value="Owner">List my Property (Owner)</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
        {{ isLoading ? 'Creating Account...' : 'Create Account' }}
      </button>

    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Login</a>
    </div>
  </div>
</div>
